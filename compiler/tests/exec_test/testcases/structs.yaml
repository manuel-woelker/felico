testcases:
  - name: struct field access
    input: |-
      struct Something {
            bar: bool,
       }
        let a = Something {
            bar: true,
        };
        debug_print(a.bar);
        a.bar = false;
        debug_print(a.bar);
    output: |-
      truefalse

  - name: impl new
    input: |-
      struct Something {
           val: f64,
      }
      impl Something {
          fun new(val: f64) -> Something {
            return Something {val: val};
          }      
      };
      //      let a = Something::new(123);
      //      debug_print(a.val);
    output: |-
      123
